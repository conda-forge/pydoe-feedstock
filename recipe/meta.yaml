{% set version = "0.3.8" %}

package:
  name: pydoe
  version: {{ version }}

source:
    fn: pyDOE-{{ version }}.zip
    url: https://pypi.org/packages/source/p/pyDOE/pyDOE-{{ version }}.zip
    sha1: 211c4d74a74109ac134dff31ed20c33141b48dbe

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  number: 2

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools

  run:
    - python >={{ python_min }}
    - scipy >=0.13
    - numpy >=1.8

test:
  requires:
    - python {{ python_min }}
  imports:
    - pyDOE

about:
  home: https://github.com/tisimst/pyDOE
  license: BSD 3-Clause
  summary: Design of experiments for Python
  description: The pyDOE package is designed to help the scientist, engineer, statistician, etc., to construct appropriate experimental designs.

extra:
  recipe-maintainers:
    - melund
